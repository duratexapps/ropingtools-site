<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Draw Pro — Producer Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=JetBrains+Mono:wght@600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --tan: #E4DAC6;
    --tan-light: #FBF8F1;
    --leather: #1E140F;
    --leather-dark: #120C08;
    --rust: #A9812E;
    --rope: #7C6448;
    --ink: #2A2420;
    --cream: #F4EFE4;
    --green: #4B5A3C;
    --brass-light: #C9A54F;
    --oxblood: #5C2430;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{ font-family:'Work Sans', sans-serif; background:var(--cream); color:var(--ink); padding:32px; }
  .panel{ max-width:820px; margin:0 auto; background:var(--tan-light); border:1px solid var(--rope); border-radius:8px; overflow:hidden; }

  .topbar{
    background:var(--leather); color:var(--cream); padding:22px 26px;
    background-image: radial-gradient(circle at 90% -10%, rgba(169,129,46,0.35), transparent 60%);
    display:flex; justify-content:space-between; align-items:flex-start;
  }
  .topbar h1{ font-family:'Playfair Display', serif; font-weight:900; font-size:24px; letter-spacing:0.5px; }
  .topbar .sub{ font-size:12.5px; color:var(--rope); margin-top:4px; font-weight:500; }
  .btn{ font-family:'Work Sans', sans-serif; font-weight:600; font-size:13.5px; padding:10px 18px; border-radius:6px; border:none; cursor:pointer; letter-spacing:0.2px; }
  .btn-primary{ background:var(--rust); color:var(--cream); }
  .btn-outline{ background:transparent; color:var(--cream); border:2px solid var(--rope); }

  .content{ padding:24px 26px; }
  .stat-row{ display:flex; gap:12px; margin-bottom:24px; }
  .stat{ flex:1; background:var(--cream); border:1px solid var(--rope); border-radius:6px; padding:14px; text-align:center; }
  .stat.warn{ border-color:var(--oxblood); }
  .stat .num{ font-family:'JetBrains Mono'; font-weight:700; font-size:24px; color:var(--rust); }
  .stat.warn .num{ color:var(--oxblood); }
  .stat .lbl{ font-size:10.5px; text-transform:uppercase; color:var(--leather); letter-spacing:0.4px; margin-top:3px; }

  .eyebrow{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--rust); margin-bottom:10px; }

  .row{
    display:flex; align-items:center; gap:14px;
    background:var(--cream); border:1px solid var(--rope); border-left:4px solid var(--rust);
    border-radius:5px; padding:12px 14px; margin-bottom:10px;
  }
  .row.flag{ border-left-color:var(--oxblood); background:#F7EDEC; }
  .tag{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    background:linear-gradient(155deg, var(--brass-light) 0%, var(--rust) 55%, #6E5119 100%);
    border:2px solid #4a3813; display:flex; align-items:center; justify-content:center;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,0.15), inset 0 2px 5px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }
  .row.flag .tag{ background:linear-gradient(155deg, #c98a8a 0%, var(--oxblood) 55%, #3d1a20 100%); }
  .tag span{ font-family:'Playfair Display', serif; font-weight:900; color:#2A2005; font-size:13px; }
  .row.flag .tag span{ color:#fbeaea; }
  .row .info{ flex:1; }
  .row .names{ font-weight:700; font-size:14.5px; color:var(--leather); }
  .row .flag-note{ font-size:11.5px; color:var(--oxblood); font-weight:600; margin-top:2px; }

  .footer{
    display:flex; justify-content:space-between; align-items:center;
    padding-top:16px; border-top:1px solid var(--rope); margin-top:8px;
  }
  .footer .note{ font-size:12.5px; color:var(--rope); font-weight:500; }
</style>
</head>
<body>
<div class="panel">
  <div class="topbar">
    <div>
      <h1>Saturday jackpot</h1>
      <div class="sub">10.5 cap &middot; entries closed &middot; 86 entrants</div>
    </div>
    <button class="btn btn-primary">Sign off and draw</button>
  </div>

  <div class="content">
    <div class="stat-row">
      <div class="stat"><div class="num">41</div><div class="lbl">Teams drawn</div></div>
      <div class="stat"><div class="num">4</div><div class="lbl">Unmatched</div></div>
      <div class="stat warn"><div class="num">2</div><div class="lbl">Spacing flagged</div></div>
    </div>

    <div class="eyebrow">Run order</div>

    <div class="row">
      <div class="tag"><span>01</span></div>
      <div class="info"><div class="names">J. Alvarez &middot; M. Chen</div></div>
    </div>
    <div class="row flag">
      <div class="tag"><span>02</span></div>
      <div class="info">
        <div class="names">R. Kessler &middot; D. Ortiz</div>
        <div class="flag-note">10-team gap not possible in this field</div>
      </div>
    </div>
    <div class="row">
      <div class="tag"><span>03</span></div>
      <div class="info"><div class="names">T. Whitfield &middot; S. Doyle</div></div>
    </div>

    <div class="footer">
      <span class="note">4 entrants need manual pairing</span>
      <button class="btn btn-outline" style="color:var(--leather); border-color:var(--rope);">Review unmatched</button>
    </div>
  </div>
</div>
</body>
</html>
